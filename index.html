<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ Belajar Baca • Disney Pixar</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== VIDEO BACKGROUND (AUTOPLAY MUTED LOOP) ===== -->
    <video id="bgVideo" playsinline preload="auto" autoplay muted loop>
        <source src="backdroputama.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <!-- ===== CONFETTI ===== -->
    <div id="confetti-container"></div>

    <!-- ===== MUSIC CONTROL ===== -->
    <div class="music-control" id="musicControl" title="Mute/Unmute Musik">🔊</div>

    <!-- ===== AUDIO BACKGROUND MUSIC ===== -->
    <audio id="bgMusic" src="asset/audio/musiclevel1.mp3" loop preload="auto" autoplay></audio>

    <!-- ===== OVERLAY START ===== -->
    <div class="start-overlay" id="startOverlay">
        <div class="start-box">
            <!-- JUDUL DIHAPUS -->
            <p class="subtitle" style="margin-top:0;">Masukkan Namamu</p>
            <div class="input-group">
                <input type="text" id="playerNameInput" placeholder="Nama pemain..." maxlength="20" autofocus>
                <button class="btn-start" id="startGameBtn">🚀 Mulai Bermain</button>
            </div>
            <div class="leaderboard-trigger">
                <button class="btn-leaderboard" id="showLeaderboardBtn">🏆 Lihat Peringkat</button>
                <button class="btn-leaderboard" id="exportLeaderboardBtn" style="margin-left:10px;">📊 Ekspor XLS</button>
            </div>
        </div>
        <!-- Tombol Hapus Data di kiri atas -->
        <button class="btn-delete-data" id="deleteDataBtn" title="Hapus semua data peringkat (Password required)">🗑️</button>
    </div>

    <!-- ===== LEADERBOARD MODAL ===== -->
    <div class="modal-overlay" id="leaderboardModal">
        <div class="modal-box">
            <h2>🏆 Papan Peringkat</h2>
            <div class="modal-close" id="closeLeaderboardBtn">&times;</div>
            <div id="leaderboardList">
                <p style="color:rgba(255,255,255,0.6); text-align:center;">Belum ada data.</p>
            </div>
            <div class="modal-actions">
                <button class="btn-danger" id="deleteRankingBtn">🗑️ Hapus Semua Data</button>
                <button class="btn-danger" id="exportModalBtn" style="background:rgba(60,120,200,0.2); border-color:rgba(60,120,200,0.3); color:rgba(180,220,255,0.7);">📊 Ekspor XLS</button>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ATRIBUSI ===== -->
    <div class="footer-attribution">
        <a href="https://pixabay.com" target="_blank">Gambar dari Pixabay</a>
    </div>

    <!-- ===== GAME CONTAINER ===== -->
    <div class="game-container" id="app" style="display:none;">
        <div class="object-image" id="objectImage">
            <span class="loading-placeholder">Memuat gambar...</span>
        </div>
        <div class="xp-bar">
            <div class="xp-item player-name" id="playerNameDisplay">
                <span class="icon">👤</span>
                <span id="playerNameText">-</span>
            </div>
            <div class="xp-divider"></div>
            <div class="xp-item">
                <span class="icon">⭐</span>
                <span>Level</span>
                <span class="value" id="levelDisplay">1</span>
            </div>
            <div class="xp-divider"></div>
            <div class="xp-item">
                <span class="icon">🏆</span>
                <span>Skor</span>
                <span class="value" id="scoreDisplay">0</span>
            </div>
        </div>
        <div class="letter-grid" id="letterGrid"></div>
        <div class="answer-zone" id="answerZone"></div>
        <div class="action-bar">
            <button class="btn btn-secondary" id="resetBtn">🔄 Ulang</button>
            <button class="btn btn-leaderboard" id="inGameLeaderboardBtn">🏆 Peringkat</button>
        </div>
        <div class="message" id="messageBox">✨ Susun huruf jadi kata!</div>
    </div>

    <!-- ===== IDENTITAS DEVELOPER ===== -->
    <div class="developer-credit">
        ❤️ Dibuat dengan cinta oleh Sule Harblaher Studio © 2026
    </div>

    <script src="script.js"></script>
</body>
</html>
